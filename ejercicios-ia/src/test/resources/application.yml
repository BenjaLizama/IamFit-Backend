spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  vectorstore:
    pgvector:
      initialize-schema: false

  ai:
    vertex:
      ai:
        gemini:
          project-id: iamfit-ai-service
          location: us-central1
          chat:
            options:
              model: gemini-2.5-flash
        embedding:
          project-id: iamfit-ai-service
          location: us-central1
          options:
            model: text-embedding-004

  autoconfigure:
    exclude:- org.springframework.ai.model.vertexai.autoconfigure.embedding.VertexAiEmbeddingAutoConfiguration
    - org.springframework.ai.model.vertexai.autoconfigure.embedding.VertexAiEmbeddingConnectionAutoConfiguration
    - org.springframework.ai.model.vertexai.autoconfigure.gemini.VertexAiGeminiChatAutoConfiguration
    - org.springframework.ai.model.vertexai.autoconfigure.gemini.VertexAiGeminiConnectionAutoConfiguration
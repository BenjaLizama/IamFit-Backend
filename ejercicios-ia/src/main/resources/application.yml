spring:
  application:
    name: iamfit-ejercicios
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    vertex:
      ai:
        gemini:
          project-id: iamfit-ai-service
          location: us-central1
          chat:
            options:
              model: gemini-2.5-flash
        embedding:
          project-id: iamfit-ai-service
          location: us-central1
          options:
            model: text-embedding-004

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: file:/tmp/auth-public.pem

  rabbitmq:
    port: 5672
    username: guest
    password: guest

iamfit:
  grpc:
    usuarios-perfiles:
      enabled: false
  rabbitmq:
    queues:
      workout-completed: iamfit.workout.completed

server:
  port: 8080

logging:
  level:
    com.iamfit: DEBUG
    org.springframework.ai: INFO
version: '3.8'

services:
  # --- 1. MICROSERVICIO DE AUTENTICACIÓN Y SEGURIDAD ---
  autenticacion-seguridad-service:
    build: ./autenticacion-seguridad
    container_name: autenticacion-seguridad-app
    ports:
      - "8080:8080"
      - "50051:50051" # gRPC
    environment:
      - SPRING_PROFILE_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://autenticacion-seguridad-db:5432/db_autenticacion_seguridad
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pass
      - SPRING_REDIS_HOST=cache-redis
      -RSA_PRIVATE=
      RSA_PUBLIC=
    entrypoint: ["java", "-Dspring.profiles.active=prod", "-jar", "app.jar"]
    depends_on:
      - autenticacion-seguridad-db
      - cache-redis

  autenticacion-seguridad-db:
    image: postgres:16-alpine
    container_name: autenticacion-seguridad-db
    environment:
      - POSTGRES_DB=db_autenticacion_seguridad
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - autenticacion_seguridad_data:/var/lib/postgresql/data

  # --- 2. MICROSERVICIO DE USUARIOS Y PERFILES ---
  usuarios-perfiles-service:
    build: ./usuarios-perfiles
    container_name: usuarios-perfiles-app
    ports:
      - "8081:8080"
      - "50052:50051"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://usuarios-perfiles-db:5432/db_usuarios_perfiles
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pass
      - SPRING_REDIS_HOST=cache-redis
    entrypoint: ["java", "-Dspring.profiles.active=prod", "-jar", "app.jar"]
    depends_on:
      - usuarios-perfiles-db
      - cache-redis

  usuarios-perfiles-db:
    image: postgres:16-alpine
    container_name: usuarios-perfiles-db
    environment:
      - POSTGRES_DB=db_usuarios_perfiles
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - usuarios_perfiles_data:/var/lib/postgresql/data

  # ---3 MICROSERVICIO DE RUTINAS ---
  ms-rutinas-service:
    build: ./ms-rutinas
    container_name: ms-rutinas-app

    ports:
      - "8082:8080"

    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ms-rutinas-db:5432/salud_db
      - SPRING_DATASOURCE_USERNAME=dev_user
      - SPRING_DATASOURCE_PASSWORD=dev_password

    depends_on:
      - ms-rutinas-db

  ms-rutinas-db:
    image: pgvector/pgvector:pg16
    container_name: ms-rutinas-db

    environment:
      - POSTGRES_DB=salud_db
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_password
    volumes:
      - ms_rutinas_data:/var/lib/postgresql/data
      - ./ms-rutinas/init.sql:/docker-entrypoint-initdb.d/init.sql


  # --- INFRAESTRUCTURA COMPARTIDA ---
  cache-redis:
    image: redis:7-alpine
    container_name: cache-redis
    ports:
      - "6380:6379"

volumes:
  autenticacion_seguridad_data:
  usuarios_perfiles_data:
  ms_rutinas_data:

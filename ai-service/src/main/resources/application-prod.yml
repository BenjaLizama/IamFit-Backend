spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}

server:
  ssl:
    enabled: false
  port: 8081

iamfit:
  services:
    alimentacion:
      base-url: http://alimentacion-app-local:8080
    ejercicios:
      base-url: http://ejercicios-app-local:8080
grpc:
  client:
    usuarios-perfiles:
      address: static://${GRPC_USUARIOS_HOST:usuarios-perfiles-app}:${GRPC_USUARIOS_PORT:50051}
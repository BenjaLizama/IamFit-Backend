spring:
  application:
    name: iamfit-ai-service

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  ai:
    vertex:
      ai:
        gemini:
          project-id: iamfit-ai-service
          location: us-central1
          chat:
            options:
              model: gemini-2.5-flash
        embedding:
          project-id: iamfit-ai-service
          location: us-central1
          options:
            model: text-embedding-004

  vectorstore:
    pgvector:
      index-type: HNSW
      distance-type: COSINE_DISTANCE
      dimensions: 768
      initialize-schema: true

  rabbitmq:
    port: 5672
    username: guest
    password: guest

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: ${RSA_PUBLIC_KEY_PATH:}

server:
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-type: PKCS12
    key-store-password: ${KEYSTORE_PASSWORD:iamfit2026}
    key-alias: iamfit-ai
    enabled-protocols: TLSv1.3

iamfit:
  rabbitmq:
    queues:
      user-created: iamfit.user.created

grpc:
  client:
    usuarios-perfiles:
      negotiation-type: plaintext

resilience4j:
  circuitbreaker:
    instances:
      vertex-ai:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      vertex-ai:
        max-attempts: 3
        wait-duration: 1s
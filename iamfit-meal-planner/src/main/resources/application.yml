spring:
  application:
    name: iamfit-meal-planner

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GCP_PROJECT_ID:iamfit-ai-service}
          location: us-central1
          chat:
            options:
              model: gemini-2.5-flash
        embedding:
          project-id: ${GCP_PROJECT_ID:iamfit-ai-service}
          location: us-central1
          options:
            model: text-embedding-004

  vectorstore:
    pgvector:
      initialize-schema: false
      table-name: vector_store
      dimensions: 768
      distance-type: COSINE_DISTANCE

  grpc:
    client:
      channels:
        usuarios-perfiles-service:
          address: 'usuarios-perfiles-app:50051'
          negotiation-type: plaintext
          security:
            enabled: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: file:/tmp/auth-public.pem

iamfit:
  rabbitmq:
    queues:
      meal-logged: iamfit.meal.logged

server:
  port: 8080

logging:
  level:
    com.iamfit: DEBUG
    org.springframework.ai: INFO